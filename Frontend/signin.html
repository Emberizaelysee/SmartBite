<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartBite Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<!-- Google fonts-->
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<!-- CSS -->
<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    <!-- LOGO -->
   <a href="index.html" class="text-decoration-none">
    <div class="logo mb-4">
    <i class="fa-solid fa-utensils me-2 icon-green"></i>
        <span>Smart</span>Bite</div>
   </a>
    <!-- CARD -->
    <div class="card card-login p-4 w-100" style="max-width:400px;">

        <h4 class="title mb-3 text-center">Welcome to <span>SmartBite</span></h4>

        <!-- TABS -->
        <div class="top-tabs">
            <button type="button" class="active">Sign In</button>
            <button type="button" onclick="location.href='signup.html'">Create Account</button>
        </div>

        <form action="login.php" method="post">

            <!-- EMAIL -->
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa fa-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                 <div class="d-flex justify-content-between align-items-center">
                 <label class="form-label mb-0">Password</label>
                <a href="#" class="forgot">Forgot Password?</a>
                 </div>
                
        <div class="input-group mt-2">
                <span class="input-group-text"><i class="fa fa-lock"></i></span>

            <input type="password" name="password" class="form-control" 
            placeholder="Enter your password" id="password" required>

                <span class="input-group-text" onclick="togglePassword('password','eyeIcon')">
                      <i class="fa fa-eye-slash" id="eyeIcon"></i>
                  </span>
                </div>
            </div>
<!-- REMEMBER ME -->
    <div class="mb-3 form-check">
        <input type="checkbox" name="remember_me" value="1" 
               class="form-check-input" id="rememberMe">
        <label class="form-check-label" for="rememberMe">Remember me</label>
    </div>
            <!-- BUTTON -->
            <button type="submit" class="btn btn-green w-100">
                Sign In <i class="fa fa-arrow-right ms-2"></i>
            </button>

            <!-- DIVIDER -->
            <div class="divider">OR CONTINUE WITH</div>

            <!-- GOOGLE -->
            <button type="button" class="social-btn w-100 d-flex justify-content-center align-items-center gap-2"
                 onclick="location.href='google-auth.php'">
             <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" width="20">
                        Google
            </button>
                
        </form>
    </div>

</div>
<!-- FOOTER -->
<footer class="text-center py-4 text-muted border-top small">

</footer>
<!-- JS FILE -->
<script src="js/script.js"></script>

</body>
</html>
