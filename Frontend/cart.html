<!-- CART -->
<div class="container my-5">

<div class="section-header">
<h2>Your Cart</h2>
<div class="divider"></div>
</div>

<div class="table-responsive">
<table class="table text-center align-middle">

<thead>
<tr>
<th>Product</th>
<th>Image</th>
<th>Qty</th>
<th>Price</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr>
<td>Chicken Burger</td>
<td>
<img src="https://i0.wp.com/flaevor.com/wp-content/uploads/2022/04/SambalFriedChickenBurger1.jpg"
alt="Chicken Burger" class="cart_img">
</td>

<td>
<input type="number" value="1" min="1" class="form-control">
</td>

<td>$10</td>

<td>
<button class="btn btn-green me-2">Update</button>
<button class="btn btn-remove">Remove</button>
</td>
</tr>

<tr>
<td>Veggie Burger</td>
<td>
<img src="https://cdn.apartmenttherapy.info/image/upload/f_jpg,q_auto:eco,c_fill,g_auto,w_1500,ar_1:1/tk/photo/2025/06-2025/2025-06-veggie-burger/veggie-burger-340"

</td>

<td>
<input type="number" value="1" min="1" class="form-control">
</td>

<td>$4</td>

<td>
<button class="btn btn-green me-2">Update</button>
<button class="btn btn-remove">Remove</button>
</td>
</tr>
