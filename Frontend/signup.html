<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartBite - Create Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
<div class="w-100" style="max-width:420px;">

    <div class="logo text-center mb-3">
        <i class="fa-solid fa-utensils me-2 icon-green"></i>
           Smart<span>Bite</span> </div>

<div class="card card-login p-4 shadow-sm">

    <h4 class="title mb-3 text-center">
        Create your <span>SmartBite</span> Account
    </h4>

<!-- TABS -->
    <div class="top-tabs">
<button type="button" onclick="location.href='signin.html'">Sign In</button>
<button type="button" class="active">Create Account</button>
    </div>

<form action="signup.php" method="POST">

<!-- NAME -->
<div class="mb-3">
<label class="form-label">Full Name</label>
<div class="input-group">
<span class="input-group-text"><i class="fa fa-user"></i></span>
<input type="text" name="fullname" class="form-control" 
id="fullname"  placeholder="Your name" required>
</div>
</div>

<!-- EMAIL -->
<div class="mb-3">
<label class="form-label">Email Address</label>
<div class="input-group">
<span class="input-group-text"><i class="fa fa-envelope"></i></span>
<input type="email" name="email" class="form-control" 
id="email" placeholder="name@example.com" required>
</div>
</div>

<!-- PASSWORD -->
<div class="mb-3">
<label class="form-label">Password</label>
<div class="input-group">
<span class="input-group-text"><i class="fa fa-lock"></i></span>
<input type="password" name="password1" class="form-control" 
id="password1" placeholder="Create password" 
oninput="checkPasswordStrength()" required>
<span class="input-group-text" onclick="togglePassword('password1','eyeIcon1')" style="cursor:pointer;">
<i class="fa fa-eye-slash" id="eyeIcon1"></i>
</span>
</div>
<!-- Message strength -->
    <div id="passwordMessage" class="password-msg"></div>
        </div>

<!-- CONFIRM -->
<div class="mb-3">
<label class="form-label">Confirm Password</label>
<div class="input-group">
<span class="input-group-text"><i class="fa fa-lock"></i></span>
<input type="password" name="confirm_password" class="form-control"
 id="password2" placeholder="Repeat password" 
 oninput="checkPasswordMatch()" required>
<span class="input-group-text" onclick="togglePassword('password2','eyeIcon2')" style="cursor:pointer;">
<i class="fa fa-eye-slash" id="eyeIcon2"></i>
</span>
</div>
<div id="matchMessage" class="password-msg"></div>
</div>

<!-- BUTTON -->
<button type="submit" class="btn btn-green w-100">
Create Account <i class="fa fa-arrow-right ms-2"></i>
</button>

<!-- DIVIDER -->
<div class="divider text-center my-3">
OR CONTINUE WITH
</div>

<button type="button" class="social-btn w-100 d-flex justify-content-center align-items-center gap-2"
     onclick="location.href='google-auth.php'">
 <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" width="20">
    Google
</button>

<!-- SIGN IN LINK -->
<p class="text-center mt-3 mb-0" style="font-size:13px;">
Already have an account?
<a href="signin.html" class="signin-link">Sign In</a>
</p>

</form>

</div>

</div>
</div>

<script src="js/script.js"></script>
</body>
</html>
